<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Pa1000 AI Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@magenta/music@^1.0.0"></script>
    <style>
        :root { --bg: #0f0f0f; --accent: #ff9800; --panel: #1a1a1a; --btn: #333; --blue: #1976d2; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .tab-bar { display: flex; background: #222; border-bottom: 2px solid var(--accent); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: var(--accent); background: #2a2a2a; }

        .content { flex: 1; overflow-y: auto; padding: 10px; display: none; }
        .content.active { display: block; }

        .panel { background: var(--panel); border-radius: 10px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        button { background: var(--btn); border: none; color: white; padding: 15px 5px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        button:active { background: var(--accent); }

        /* Mixer Sliders */
        .mixer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
        .v-slider { appearance: slider-vertical; width: 35px; height: 140px; accent-color: var(--accent); }
        .mute-btn { width: 100%; font-size: 9px; margin-top: 5px; }
        .active-mute { background: #c62828; }

        /* AI & Quarter Tones */
        .scale-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
        .note-btn.detuned { background: var(--blue); }

        footer { background: #111; padding: 10px; border-top: 1px solid #333; }
        .pitch-bar { width: 100%; height: 40px; accent-color: var(--accent); }
    </style>
</head>
<body>

<div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('live')">LIVE</button>
    <button class="tab-btn" onclick="showTab('mixer')">MIXER/SCALES</button>
    <button class="tab-btn" onclick="showTab('songbook')">SONGBOOK</button>
    <button class="tab-btn" onclick="showTab('ai')">AI CHORDS</button>
</div>

<div id="live" class="content active">
    <div class="panel grid">
        <button onclick="sendCC(80,0)">Intro 1</button><button onclick="sendCC(80,3)">Var 1</button>
        <button onclick="sendCC(80,4)">Var 2</button><button onclick="sendCC(80,7)">Fill 1</button>
        <button onclick="sendCC(80,12)">End 1</button><button onclick="sendCC(80,11)" style="background:#555">BREAK</button>
        <button onclick="sendDirect(0xFA)" style="background:#2e7d32">START</button>
        <button onclick="sendDirect(0xFC)" style="background:#c62828">STOP</button>
    </div>
    <div class="panel">
        <button onclick="panic()" style="width:100%; background:#c62828">PANIC / ALL NOTES OFF</button>
    </div>
</div>

<div id="mixer" class="content">
    <div class="panel mixer-grid">
        <div class="chan"><span>UP1</span><br><input type="range" class="v-slider" oninput="setVol(0,this.value)"><button class="mute-btn" onclick="toggleMute(0,this)">MUTE</button></div>
        <div class="chan"><span>UP2</span><br><input type="range" class="v-slider" oninput="setVol(1,this.value)"><button class="mute-btn" onclick="toggleMute(1,this)">MUTE</button></div>
        <div class="chan"><span>UP3</span><br><input type="range" class="v-slider" oninput="setVol(2,this.value)"><button class="mute-btn" onclick="toggleMute(2,this)">MUTE</button></div>
        <div class="chan"><span>BACK</span><br><input type="range" class="v-slider" oninput="setVol(8,this.value)"><button class="mute-btn" onclick="toggleMute(8,this)">MUTE</button></div>
    </div>
    <div class="panel">
        <div style="font-size:10px; margin-bottom:10px;">QUARTER TONES (MORYA)</div>
        <div class="scale-grid" id="scaleGrid"></div>
        <button onclick="resetScale()" style="width:100%; margin-top:10px;">RESET SCALE</button>
    </div>
</div>

<div id="songbook" class="content">
    <input type="file" id="fileIn" style="display:none" onchange="importSB(event)">
    <button onclick="document.getElementById('fileIn').click()" style="width:100%; background:var(--blue)">IMPORT MYSONGS.TXT</button>
    <input type="text" id="search" placeholder="Αναζήτηση..." onkeyup="filterSB()" style="width:100%; padding:10px; margin:10px 0; background:#222; border:1px solid #444; color:white;">
    <div id="sbList" style="display:flex; flex-direction:column; gap:5px;"></div>
</div>

<div id="ai" class="content">
    <div class="panel">
        <h3>AI Suggestion Engine</h3>
        <p id="aiStatus" style="font-size:11px; color:var(--accent);">Αναμονή για μελωδία...</p>
        <div id="chordSugs" class="grid"></div>
    </div>
</div>

<footer>
    <input type="range" id="pBar" class="pitch-bar" min="0" max="16383" value="8192" oninput="sPitch(this.value)" onmouseup="rPitch()" ontouchend="rPitch()">
</footer>

<script>
let midiOut = null;
let songs = [];
let detunedNotes = new Array(12).fill(false);

navigator.requestMIDIAccess({sysex:true}).then(a => {
    midiOut = Array.from(a.outputs.values())[0];
    a.inputs.forEach(i => i.onmidimessage = handleInput);
});

function handleInput(m) {
    let [s, n, v] = m.data;
    if(s >= 0x90 && s <= 0x92 && v > 0) analyzeAI(n % 12);
}

function sendCC(c,v) { if(midiOut) midiOut.send([0xB0,c,v]); }
function sendDirect(b) { if(midiOut) midiOut.send([b]); }
function setVol(ch,v) { if(midiOut) midiOut.send([0xB0+ch, 7, v]); }
function sPitch(v) { if(midiOut) midiOut.send([0xE0, v&0x7F, (v>>7)&0x7F]); }
function rPitch() { document.getElementById('pBar').value=8192; sPitch(8192); }

function toggleMute(ch,btn) {
    let active = btn.classList.toggle('active-mute');
    midiOut.send([0xB0+ch, 11, active ? 0 : 127]);
}

// SCALE LOGIC
const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const grid = document.getElementById('scaleGrid');
notes.forEach((n,i) => {
    grid.innerHTML += `<button id="n${i}" onclick="tScale(${i})" class="note-btn">${n}</button>`;
});

function tScale(i) {
    detunedNotes[i] = !detunedNotes[i];
    document.getElementById('n'+i).classList.toggle('detuned');
    let sysex = [0xF0, 0x42, 0x40, 0x00, 0x01, 0x05, 0x08, i, detunedNotes[i]?14:64, 0xF7];
    midiOut.send(sysex);
}

function resetScale() { 
    detunedNotes.fill(false); 
    notes.forEach((n,i)=>{
        document.getElementById('n'+i).classList.remove('detuned');
        midiOut.send([0xF0, 0x42, 0x40, 0x00, 0x01, 0x05, 0x08, i, 64, 0xF7]);
    });
}

// SONGBOOK LOGIC
function importSB(e) {
    const r = new FileReader();
    r.onload = (ev) => {
        songs = ev.target.result.split('\n').slice(4).map(l => {
            let p = l.split('\t');
            if(p.length<2) return null;
            let id = parseInt(p[0]);
            return {id, name:p[1], pc:id%128, lsb:Math.floor(id/128)};
        }).filter(s=>s);
        renderSB(songs);
    };
    r.readAsText(e.target.files[0]);
}
function renderSB(list) {
    document.getElementById('sbList').innerHTML = list.map(s => `
        <button onclick="selS(${s.pc},${s.lsb})" style="text-align:left; padding:10px;">${s.name}</button>
    `).join('');
}
function selS(p,l) { sendCC(0,0); sendCC(32,l); sendDirect(0xC0|p); }

function showTab(id) {
    document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

function panic() { for(let i=0;i<16;i++) sendCC(123,0); }
</script>
</body>
</html>

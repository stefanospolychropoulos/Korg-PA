<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN Pa1000 v38 - ULTIMATE MAQAM</title>
    <style>
        :root { --bg: #000; --accent: #00f2ff; --red: #ff1744; --panel: #0d0d0d; --btn: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .status-bar { height: 4dvh; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; font-size: 10px; color: #444; background: #050505; }
        #midi-led { width: 8px; height: 8px; border-radius: 50%; background: #200; }
        .nav { height: 8dvh; display: flex; background: #050505; border-bottom: 1px solid #222; }
        .tab { flex: 1; border: none; background: none; color: #555; font-weight: 900; font-size: 10px; text-transform: uppercase; }
        .tab.active { color: var(--accent); box-shadow: inset 0 -3px 0 var(--accent); background: #0a0a0a; }
        .main { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        .view { display: none; height: 100%; flex-direction: column; gap: 8px; }
        .view.active { display: flex; }
        .card { background: var(--panel); border: 1px solid #1a1a1a; border-radius: 12px; padding: 10px; }
        .grid { display: grid; gap: 6px; grid-template-columns: repeat(4, 1fr); }
        button { background: var(--btn); border: 1px solid #333; color: #fff; padding: 18px 2px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .n-act { background: var(--accent) !important; color: #000; box-shadow: 0 0 15px var(--accent); border:none; }
        select { background: #111; color: var(--accent); border: 1px solid #333; padding: 15px; border-radius: 10px; width: 100%; font-size: 15px; font-weight: bold; appearance: none; text-align: center; }
        .footer { height: 20dvh; background: #000; border-top: 1px solid #333; padding: 10px; display: flex; flex-direction: column; justify-content: center; }
        .slider-group { position: relative; height: 70px; background: #0a0a0a; border-radius: 15px; border: 1px solid #222; overflow: hidden; }
        input[type=range] { width: 100%; height: 100%; appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 80px; height: 70px; background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="status-bar">
    <div><span id="midi-led"></span> MIDI READY</div>
    <div id="clock">00:00</div>
    <div id="bat">BATT: --%</div>
</div>

<div class="nav">
    <button class="tab active" onclick="tab('scale', this)">MAKAM</button>
    <button class="tab" onclick="tab('live', this)">ENGINE</button>
    <button class="tab" onclick="tab('auto', this)">MACROS</button>
</div>

<div class="main">
    <div id="scale" class="view active">
        <div class="card">
            <select id="mkm_select">
                <option value="none">-- NATURAL --</option>
                <optgroup label="ΔΗΜΟΦΙΛΗ">
                    <option value="rast">RAST (Ραστ)</option>
                    <option value="ussak">USSAK (Ουσάκ)</option>
                    <option value="hicaz">HICAZ (Χιτζάζ)</option>
                    <option value="huzam">HUZAM (Χουζάμ)</option>
                    <option value="sabah">SABAH (Σαμπάχ)</option>
                </optgroup>
                <optgroup label="ΔΕΥΤΕΡΕΥΟΝΤΑ">
                    <option value="karj">KARJIGAR (Καρτζιγιάρ)</option>
                    <option value="neva">NEVA (Νεβά)</option>
                    <option value="beyat">BEYATI (Μπεϊγιατί)</option>
                    <option value="ispah">ISPAHAN (Ισπαχάν)</option>
                    <option value="u-ced">UZZAL CEDID</option>
                </optgroup>
                <optgroup label="ΣΕΓΚΙΑΧ / ΣΠΑΝΙΑ">
                    <option value="sega">SEGAH (Σεγκιάχ)</option>
                    <option value="must">MUSTAAR (Μουσταάρ)</option>
                    <option value="best">BESTENIGAR</option>
                    <option value="evic">EVIC (Εβίτς)</option>
                    <option value="ferah">FERAHNAK</option>
                    <option value="iraq">IRAQ (Ιράκ)</option>
                </optgroup>
                <optgroup label="ΒΑΡΙΑ ΑΝΑΤΟΛΙΚΑ">
                    <option value="z-hic">ZIRGULE HICAZ</option>
                    <option value="suzin">SUZINAK</option>
                    <option value="nakis">NAKIS</option>
                    <option value="rehav">REHAVI</option>
                    <option value="penj">PENJIGAH</option>
                    <option value="hisar">HISAR</option>
                </optgroup>
                <optgroup label="ΕΙΔΙΚΑ">
                    <option value="acem">ACEM (Ατζέμ)</option>
                    <option value="mahur">MAHUR (Μαχούρ)</option>
                    <option value="kurdi">KURDI (Κιουρδί)</option>
                    <option value="nihav">NIHAVENT (Νιαβέντ)</option>
                    <option value="busel">BUSELIK (Μπουσελίκ)</option>
                </optgroup>
            </select>
        </div>
        <div class="card" style="flex:1;">
            <div id="sgrid" class="grid"></div>
        </div>
        <button onclick="resS()" style="width:100%; color: var(--red); border-color: var(--red);">RESET ALL</button>
    </div>
    
    <div id="live" class="view"></div>
    <div id="auto" class="view"></div>
</div>

<div class="footer">
    <div class="slider-group">
        <input type="range" id="pb" min="0" max="16383" value="8192" oninput="bend(this.value)" ontouchend="rPB()">
    </div>
</div>

<script>
let out = null, dtn = new Array(12).fill(false);

navigator.requestMIDIAccess({sysex:true}).then(m => {
    out = Array.from(m.outputs.values())[0];
    if(out) document.getElementById('midi-led').style.background = '#00f2ff';
});

// --- THE COMPLETE MAQAM DICTIONARY ---
// 0x40=0, 0x21=-31c, 0x0E=-50c, 0x05=-58c, 0x12=-45c, 0x15=-43c, 0x00=-64c
const maqamData = {
    "rast":  [{idx: 4, val: 0x21}, {idx: 11, val: 0x21}],
    "ussak": [{idx: 2, val: 0x05}],
    "hicaz": [{idx: 1, val: 0x12}],
    "huzam": [{idx: 1, val: 0x15}, {idx: 4, val: 0x21}, {idx: 11, val: 0x21}],
    "sabah": [{idx: 2, val: 0x05}, {idx: 6, val: 0x0E}],
    "karj":  [{idx: 2, val: 0x0E}, {idx: 8, val: 0x0E}],
    "neva":  [{idx: 4, val: 0x21}, {idx: 9, val: 0x21}],
    "beyat": [{idx: 2, val: 0x05}],
    "ispah": [{idx: 2, val: 0x0E}, {idx: 9, val: 0x21}],
    "u-ced": [{idx: 1, val: 0x12}, {idx: 4, val: 0x21}],
    "sega":  [{idx: 0, val: 0x21}, {idx: 5, val: 0x21}],
    "must":  [{idx: 0, val: 0x21}, {idx: 4, val: 0x0E}],
    "best":  [{idx: 0, val: 0x21}, {idx: 5, val: 0x0E}, {idx: 11, val: 0x21}, {idx: 6, val: 0x0E}],
    "evic":  [{idx: 0, val: 0x21}, {idx: 4, val: 0x21}, {idx: 7, val: 0x21}, {idx: 11, val: 0x0E}],
    "ferah": [{idx: 4, val: 0x21}, {idx: 7, val: 0x21}, {idx: 11, val: 0x21}],
    "iraq":  [{idx: 0, val: 0x21}, {idx: 4, val: 0x0E}, {idx: 11, val: 0x21}],
    "z-hic": [{idx: 1, val: 0x12}, {idx: 4, val: 0x12}, {idx: 8, val: 0x12}],
    "suzin": [{idx: 4, val: 0x21}, {idx: 11, val: 0x12}],
    "nakis": [{idx: 2, val: 0x0E}, {idx: 6, val: 0x21}],
    "rehav": [{idx: 2, val: 0x0E}, {idx: 4, val: 0x21}, {idx: 11, val: 0x21}],
    "penj":  [{idx: 4, val: 0x21}, {idx: 2, val: 0x21}],
    "hisar": [{idx: 1, val: 0x12}, {idx: 8, val: 0x21}],
    "acem":  [{idx: 11, val: 0x40}], 
    "mahur": [{idx: 11, val: 0x21}],
    "kurdi": [{idx: 1, val: 0x40}], 
    "nihav": [{idx: 8, val: 0x0E}, {idx: 11, val: 0x0E}],
    "busel": [{idx: 1, val: 0x40}, {idx: 4, val: 0x40}]
};

function applyMakam(baseIdx) {
    const type = document.getElementById('mkm_select').value;
    resS(); 
    if(type === "none") return;
    maqamData[type].forEach(n => setN((baseIdx + n.idx) % 12, true, n.val));
    if(navigator.vibrate) navigator.vibrate(40);
}

function setN(i, s, val = 0x0E) {
    dtn[i] = s;
    const btn = document.getElementById('n'+i);
    if(btn) btn.classList.toggle('n-act', s);
    if(out) out.send([0xF0, 0x42, 0x40, 0x00, 0x01, 0x05, 0x08, i, s ? val : 0x40, 0xF7]);
}

function resS() { for(let i=0; i<12; i++) setN(i, false); }

const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const sg = document.getElementById('sgrid');
notes.forEach((n,i) => {
    const b = document.createElement('button');
    b.id = 'n'+i; b.innerText = n;
    b.onclick = () => applyMakam(i);
    sg.appendChild(b);
});

function tab(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

function bend(v) { if(out) out.send([0xE0, v & 0x7F, (v >> 7) & 0x7F]); }
function rPB() { document.getElementById('pb').value=8192; bend(8192); }
setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
</script>
</body>
</html>

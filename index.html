<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN Pa5X PRESTIGE v62</title>
    <style>
        :root { --bg: #000; --accent: #00f2ff; --gold: #d4af37; --panel: #0f0f0f; --dark-btn: #1a1a1a; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { height: 4dvh; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; background: #000; border-bottom: 1px solid #333; font-size: 9px; color: var(--gold); font-weight: bold; }
        
        /* MIXER STRIPS (The Pa5X Sliders) */
        .mixer-section { height: 25dvh; display: flex; gap: 2px; padding: 5px; background: #050505; }
        .strip { flex: 1; display: flex; flex-direction: column; align-items: center; background: var(--panel); border-radius: 4px; border: 1px solid #222; }
        .strip-label { font-size: 6px; color: #666; margin-top: 4px; }
        .strip-slider { appearance: none; width: 80px; height: 20px; transform: rotate(-90deg) translateY(0); margin-top: 45px; background: transparent; }
        .strip-slider::-webkit-slider-thumb { appearance: none; width: 12px; height: 24px; background: var(--gold); border-radius: 2px; }

        /* THE MATRIX (Pa5X Grid) */
        .matrix-container { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 8px; }
        .p5-btn { background: var(--dark-btn); border: 1px solid #333; color: #aaa; border-radius: 4px; font-size: 8px; font-weight: 900; }
        .p5-btn.active { border-color: var(--accent); color: var(--accent); background: #001a1a; }

        /* THE CHORD LOOPER & X-FADER */
        .control-row { height: 12dvh; display: flex; gap: 8px; padding: 5px 10px; align-items: center; background: #080808; }
        .looper-box { display: flex; flex-direction: column; gap: 2px; }
        .xfader-container { flex: 1; position: relative; }
        #xfader { width: 100%; height: 30px; appearance: none; background: #111; border: 1px solid #333; border-radius: 15px; }
        #xfader::-webkit-slider-thumb { appearance: none; width: 40px; height: 30px; background: var(--platinum); border-radius: 15px; border: 2px solid var(--accent); }

        /* Footer */
        .footer { height: 12dvh; display: flex; gap: 10px; padding: 5px 10px; border-top: 1px solid #222; }
        .pb-area { flex: 1; background: #000; border-radius: 8px; border: 1px solid #444; position: relative; }
        #pb { width: 100%; height: 100%; appearance: none; background: transparent; }
        #pb::-webkit-slider-thumb { appearance: none; width: 60px; height: 45px; background: var(--accent); border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">
    <div>TITAN Pa5X PRESTIGE v62</div>
    <div id="clock">00:00:00</div>
</div>

<div class="mixer-section">
    <div class="strip"><span class="strip-label">DRUM</span><input type="range" class="strip-slider" oninput="mCC(9, this.value)"></div>
    <div class="strip"><span class="strip-label">BASS</span><input type="range" class="strip-slider" oninput="mCC(10, this.value)"></div>
    <div class="strip"><span class="strip-label">ACC1</span><input type="range" class="strip-slider" oninput="mCC(11, this.value)"></div>
    <div class="strip"><span class="strip-label">ACC2</span><input type="range" class="strip-slider" oninput="mCC(12, this.value)"></div>
    <div class="strip" style="border-color:var(--gold)"><span class="strip-label">UP1</span><input type="range" class="strip-slider" oninput="mCC(7, this.value)"></div>
    <div class="strip" style="border-color:var(--gold)"><span class="strip-label">UP2</span><input type="range" class="strip-slider" oninput="mCC(13, this.value)"></div>
    <div class="strip" style="border-color:var(--gold)"><span class="strip-label">UP3</span><input type="range" class="strip-slider" oninput="mCC(14, this.value)"></div>
</div>

<div class="control-row">
    <div class="looper-box">
        <button style="color:red; font-size:7px" onclick="mCC(80,90)">● REC</button>
        <button style="color:var(--green); font-size:7px" onclick="mCC(80,91)">▶ PLAY</button>
    </div>
    <div class="xfader-container">
        <input type="range" id="xfader" min="0" max="127" value="64" oninput="mCC(1, this.value)">
        <div style="display:flex; justify-content:space-between; font-size:7px; color:#555; padding:0 10px;"><span>STYLE</span><span>KEYBOARD</span></div>
    </div>
</div>

<div class="matrix-container">
    <button class="p5-btn" onclick="mCC(80,20)">STS 1</button>
    <button class="p5-btn" onclick="mCC(80,21)">STS 2</button>
    <button class="p5-btn" onclick="mCC(80,22)">STS 3</button>
    <button class="p5-btn" onclick="mCC(80,23)">STS 4</button>
    
    <button class="p5-btn active" id="m1" onclick="tM(80,80,'m1')">DRUM MUTE</button>
    <button class="p5-btn active" id="m2" onclick="tM(80,81,'m2')">BASS MUTE</button>
    <button class="p5-btn" id="m3" onclick="tM(80,82,'m3')">SST HOLD</button>
    <button class="p5-btn" onclick="mCC(80,70)">FLAT ALL</button>
</div>

<div class="footer">
    <div class="pb-area">
        <input type="range" id="pb" min="0" max="16383" value="8192" oninput="mPB(this.value)" ontouchend="rePB()">
    </div>
    <div style="width:80px; display:flex; flex-direction:column; gap:2px;">
        <button style="flex:1; background:var(--green); color:black; font-weight:bold" onclick="mCC(80,15)">START</button>
        <button style="flex:1; background:var(--red); color:black; font-weight:bold" onclick="mCC(80,16)">STOP</button>
    </div>
</div>

<script>
let mO = null, mS = {};
navigator.requestMIDIAccess().then(a => { mO = Array.from(a.outputs.values())[0]; });
function mCC(c, v) { if(mO) mO.send([0xB0, c, v]); if(navigator.vibrate) navigator.vibrate(10); }
function mPB(v) { if(mO) mO.send([0xE0, v & 0x7F, (v >> 7) & 0x7F]); }
function rePB() { document.getElementById('pb').value=8192; mPB(8192); }
function tM(c, v, id) { mS[id]=!mS[id]; mCC(c, mS[id]?127:0); document.getElementById(id).classList.toggle('active', mS[id]); }
setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>

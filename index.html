<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Korg Pa1000 Ultimate Mirror</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ff9800; --panel: #1a1a1a; --btn: #333; --blue: #1565c0; --green: #2e7d32; --purple: #6a1b9a; --red: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Tabs */
        .tab-bar { display: flex; background: #222; border-bottom: 2px solid var(--accent); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #777; cursor: pointer; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent); background: #2a2a2a; border-bottom: 3px solid var(--accent); }

        .content { flex: 1; overflow-y: auto; padding: 10px; display: none; }
        .content.active { display: block; }

        .panel { background: var(--panel); border-radius: 10px; padding: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .grid { display: grid; gap: 8px; }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-2 { grid-template-columns: 1fr 1fr; }

        button { background: var(--btn); border: none; color: white; padding: 10px 5px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; transition: 0.1s; }
        button:active { background: var(--accent) !important; color: black !important; transform: scale(0.95); }

        /* Styles Matrix */
        .section-label { font-size: 9px; color: var(--accent); font-weight: bold; margin: 8px 0 3px 0; text-transform: uppercase; }
        .banks-matrix { display: grid; grid-template-columns: repeat(9, 1fr); gap: 3px; background: #111; padding: 5px; border-radius: 5px; }
        .bank-btn { padding: 8px 0; font-size: 8px; border: 1px solid #444; }
        .b-factory { background: #222; }
        .b-user { background: var(--green); }
        .b-fav { background: var(--blue); }
        .b-direct { background: var(--purple); }
        .bank-btn.active { background: var(--accent) !important; color: black; border-color: white; }

        /* Style Grid */
        .mirror-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; height: 220px; }
        .slot { background: linear-gradient(180deg, #333, #111); border: 1px solid #555; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; font-size: 12px; height: 45px; overflow: hidden; }

        .page-ctrl { display: flex; justify-content: center; gap: 3px; margin-top: 8px; flex-wrap: wrap; }
        .p-btn { min-width: 28px; height: 28px; background: #222; border: 1px solid #444; color: white; font-size: 9px; }
        .p-btn.active { background: var(--accent); color: black; }

        .search-box { width: 100%; padding: 12px; background: #000; border: 1px solid var(--accent); color: white; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px; }

        /* Mixer */
        .chan-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
        .v-slider { appearance: slider-vertical; width: 25px; height: 80px; accent-color: var(--accent); }
        
        footer { background: #111; padding: 10px; border-top: 1px solid #333; }
        .pitch-bar { width: 100%; height: 30px; accent-color: var(--accent); }
    </style>
</head>
<body>

<div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('live')">LIVE</button>
    <button class="tab-btn" onclick="showTab('mirror')">STYLES</button>
    <button class="tab-btn" onclick="showTab('songbook')">SONGBOOK</button>
    <button class="tab-btn" onclick="showTab('mixer')">MIXER / SCALES</button>
</div>

<div id="live" class="content active">
    <div class="panel">
        <div style="font-size:10px; color:var(--accent); margin-bottom:8px; font-weight:bold;">INTRO / ENDING</div>
        <div class="grid grid-4" style="margin-bottom:15px;">
            <button onclick="sendCC(80,0)">Intro 1</button>
            <button onclick="sendCC(80,1)">Intro 2</button>
            <button onclick="sendCC(80,2)">Intro 3</button>
            <button onclick="sendCC(80,11)" style="background:var(--red); height: 50px;">BREAK</button>
        </div>

        <div style="font-size:10px; color:var(--accent); margin-bottom:8px; font-weight:bold;">VARIATIONS & FILLS</div>
        <div class="grid grid-4" style="gap:10px 5px;">
            <button onclick="sendCC(80,3)" style="border-bottom: 4px solid var(--accent); height:55px;">VAR 1</button>
            <button onclick="sendCC(80,4)" style="border-bottom: 4px solid var(--accent); height:55px;">VAR 2</button>
            <button onclick="sendCC(80,5)" style="border-bottom: 4px solid var(--accent); height:55px;">VAR 3</button>
            <button onclick="sendCC(80,6)" style="border-bottom: 4px solid var(--accent); height:55px;">VAR 4</button>
            
            <button onclick="sendCC(80,7)" style="background:var(--green)">FILL 1</button>
            <button onclick="sendCC(80,8)" style="background:var(--green)">FILL 2</button>
            <button onclick="sendCC(80,9)" style="background:var(--green)">FILL 3</button>
            <button onclick="sendCC(80,10)" style="background:var(--green)">FILL 4</button>
        </div>

        <div class="grid grid-2" style="margin-top:15px; gap:10px;">
            <button id="autoFillBtn" onclick="toggleAutoFill()" style="background:#444; height:45px;">AUTO FILL: OFF</button>
            <button onclick="sendCC(81,4)" style="background:var(--blue); height:45px;">PAD STOP</button>
        </div>

        <div class="grid grid-4" style="margin-top:15px;">
            <button onclick="sendCC(80,12)">End 1</button>
            <button onclick="sendCC(80,13)">End 2</button>
            <button onclick="sendCC(80,14)">End 3</button>
            <button onclick="panic()" style="background:#222">PANIC</button>
        </div>
    </div>

    <div class="grid grid-2" style="gap:10px;">
        <button onclick="sendDirect(0xFC)" style="height:70px; background:var(--red); font-size:16px;">STOP</button>
        <button onclick="sendDirect(0xFA)" style="height:70px; background:var(--green); font-size:16px;">START</button>
    </div>
</div>

<div id="mirror" class="content">
    <div class="panel">
        <input type="file" id="styleFile" style="display:none" onchange="loadSet(this)">
        <button onclick="document.getElementById('styleFile').click()" style="width:100%; background:var(--blue); padding:10px; margin-bottom:8px;">LOAD SET (.TXT)</button>
        <input type="text" class="search-box" id="styleSearch" placeholder="🔍 Αναζήτηση Style..." oninput="searchStyles(this.value)">
    </div>

    <div id="mirrorContainer">
        <div class="section-label">Factory</div>
        <div class="banks-matrix" id="fBanks"></div>
        <div class="section-label">User / Favorites</div>
        <div class="banks-matrix" id="uBanks"></div>
        <div class="section-label">Direct (USB)</div>
        <div class="banks-matrix" id="dBanks"></div>

        <div class="mirror-grid" id="styleGrid"></div>
        <div class="page-ctrl" id="stylePages"></div>
    </div>
    <div id="styleSearchResults" style="display:none;" class="panel"></div>
</div>

<div id="songbook" class="content">
    <div class="panel">
        <input type="file" id="songFile" style="display:none" onchange="loadSongs(this)">
        <button onclick="document.getElementById('songFile').click()" style="width:100%; background:var(--green); padding:10px; margin-bottom:10px;">LOAD SONGBOOK (.TXT)</button>
        <input type="text" class="search-box" placeholder="Αναζήτηση τραγουδιού..." oninput="searchSongs(this.value)">
    </div>
    <div id="songList" class="grid"></div>
</div>

<div id="mixer" class="content">
    <div class="panel chan-grid">
        <div class="chan"><span>UP1</span><br><input type="range" class="v-slider" oninput="setVol(0,this.value)"></div>
        <div class="chan"><span>UP2</span><br><input type="range" class="v-slider" oninput="setVol(1,this.value)"></div>
        <div class="chan"><span>UP3</span><br><input type="range" class="v-slider" oninput="setVol(2,this.value)"></div>
        <div class="chan"><span>STY</span><br><input type="range" class="v-slider" oninput="sendCC(39,this.value)"></div>
    </div>
    <div class="panel">
        <div id="scaleGrid" style="display:grid; grid-template-columns: repeat(6, 1fr); gap:5px;"></div>
        <button onclick="resetScale()" style="width:100%; margin-top:10px; background:#444; padding:12px;">RESET SCALE</button>
    </div>
</div>

<footer>
    <input type="range" id="pBar" class="pitch-bar" min="0" max="16383" value="8192" oninput="sPitch(this.value)" onmouseup="rPitch()">
</footer>

<script>
let midiOut = null;
let currentBank = 10, currentBankCC32 = 0, currentPage = 1;
let styleMirror = {}, songMirror = [], detunedNotes = new Array(12).fill(false);
let autoFillActive = false;

// MIDI
navigator.requestMIDIAccess({sysex:true}).then(access => midiOut = Array.from(access.outputs.values())[0]);

function sendCC(cc, val) { if(midiOut) midiOut.send([0xB0, cc, val]); }
function sendDirect(b) { if(midiOut) midiOut.send([b]); }
function setVol(c, v) { if(midiOut) midiOut.send([0xB0 + c, 7, v]); }
function sPitch(v) { if(midiOut) midiOut.send([0xE0, v & 0x7F, (v >> 7) & 0x7F]); }
function rPitch() { document.getElementById('pBar').value=8192; sPitch(8192); }

function toggleAutoFill() {
    autoFillActive = !autoFillActive;
    sendCC(82, autoFillActive ? 127 : 0);
    const btn = document.getElementById('autoFillBtn');
    btn.innerText = "AUTO FILL: " + (autoFillActive ? "ON" : "OFF");
    btn.style.background = autoFillActive ? "var(--accent)" : "#444";
    btn.style.color = autoFillActive ? "black" : "white";
}

// Banks Init
const fNames = ["P1","P2","P3","P4","P5","P6","P7","P8","P9"];
const uNames = ["U1","U2","U3","U4","U5","U6","FV1","FV2","FV3","FV4","FV5","FV6","FV7","FV8","FV9","FV10"];
const dNames = ["DU1","DU2","DU3","DU4","DU5","DU6","DF1","DF2","DF3","DF4","DF5","DF6","DF7","DF8","DF9","DF10"];

function init() {
    const fD = document.getElementById('fBanks'), uD = document.getElementById('uBanks'), dD = document.getElementById('dBanks');
    fNames.forEach((n,i) => createB(n, i+1, i, fD, 'b-factory'));
    uNames.forEach((n,i) => createB(n, i+10, i+9, uD, n.startsWith('U')?'b-user':'b-fav'));
    dNames.forEach((n,i) => createB(n, i+26, i+25, dD, 'b-direct'));
    
    // Scale Init
    const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const sG = document.getElementById('scaleGrid');
    notes.forEach((n,i) => {
        sG.innerHTML += `<button id="n${i}" onclick="tScale(${i})" style="padding:12px 0; background:#222; border:1px solid #444;">${n}</button>`;
    });
}

function createB(name, id, cc32, cont, cls) {
    const b = document.createElement('button');
    b.className = `bank-btn ${cls} b-id-${id}`;
    b.innerText = name;
    if(id === 10) b.classList.add('active');
    b.onclick = () => {
        currentBank = id; currentBankCC32 = cc32; currentPage = 1;
        document.querySelectorAll('.bank-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        renderStyleGrid();
    };
    cont.appendChild(b);
}

function loadSet(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const lines = e.target.result.split('\n').map(l => l.trim()).filter(l => l !== "");
        for(let i = 1; i <= 55; i++) styleMirror[i] = lines.slice((i-1)*128, i*128);
        renderStyleGrid();
    };
    reader.readAsText(input.files[0]);
}

function renderStyleGrid() {
    document.getElementById('mirrorContainer').style.display = 'block';
    document.getElementById('styleSearchResults').style.display = 'none';
    const grid = document.getElementById('styleGrid'); grid.innerHTML = '';
    const start = (currentPage-1)*8; const names = styleMirror[currentBank] || [];
    for(let i=0; i<8; i++) {
        const idx = start + i;
        const div = document.createElement('div'); div.className = 'slot';
        div.innerText = names[idx] || (idx+1)+". ---";
        div.onclick = () => { sendCC(0,0); sendCC(32, currentBankCC32); midiOut.send([0xC0, idx]); };
        grid.appendChild(div);
    }
    const pg = document.getElementById('stylePages'); pg.innerHTML = '';
    for(let i=1; i<=16; i++) {
        const b = document.createElement('button'); b.className = `p-btn ${i===currentPage?'active':''}`;
        b.innerText = i; b.onclick = () => { currentPage = i; renderStyleGrid(); };
        pg.appendChild(b);
    }
}

function searchStyles(q) {
    if(!q) { renderStyleGrid(); return; }
    document.getElementById('mirrorContainer').style.display = 'none';
    const res = document.getElementById('styleSearchResults');
    res.style.display = 'block'; res.innerHTML = '';
    for(let b in styleMirror) {
        styleMirror[b].forEach((name, idx) => {
            if(name.toLowerCase().includes(q.toLowerCase())) {
                const btn = document.createElement('button');
                btn.style = "width:100%; text-align:left; padding:12px; margin-bottom:4px; background:#222; border-left:4px solid var(--accent);";
                btn.innerText = name;
                btn.onclick = () => { sendCC(0,0); sendCC(32, b-1); midiOut.send([0xC0, idx]); };
                res.appendChild(btn);
            }
        });
    }
}

function loadSongs(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        songMirror = e.target.result.split('\n').map(l => l.trim()).filter(l !== "");
        renderSongs(songMirror);
    };
    reader.readAsText(input.files[0]);
}
function renderSongs(list) {
    document.getElementById('songList').innerHTML = list.map((s, i) => `<button onclick="selectSong(${i})" style="text-align:left; padding:15px; background:#222; margin-bottom:2px;">${s}</button>`).join('');
}
function searchSongs(q) { renderSongs(songMirror.filter(s => s.toLowerCase().includes(q.toLowerCase()))); }
function selectSong(i) { sendCC(0,0); midiOut.send([0xC0, i % 128]); }

function tScale(i) {
    detunedNotes[i] = !detunedNotes[i];
    document.getElementById('n'+i).style.background = detunedNotes[i] ? 'var(--blue)' : '#222';
    midiOut.send([0xF0, 0x42, 0x40, 0x00, 0x01, 0x05, 0x08, i, detunedNotes[i]?14:64, 0xF7]);
}
function resetScale() {
    detunedNotes.fill(false);
    for(let i=0; i<12; i++) { document.getElementById('n'+i).style.background = '#222'; midiOut.send([0xF0, 0x42, 0x40, 0x00, 0x01, 0x05, 0x08, i, 64, 0xF7]); }
}

function showTab(id) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active'); event.currentTarget.classList.add('active');
}

function panic() { for(let i=0; i<16; i++) sendCC(123, 0); }

init();
renderStyleGrid();
</script>
</body>
</html>

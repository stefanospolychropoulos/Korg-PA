<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN v73 - IMPERIAL SCALER</title>
    <style>
        :root { --bg: #000; --accent: #00f2ff; --gold: #d4af37; --flat: #ff1744; --panel: #0d0d0d; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { height: 4dvh; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 10px; color: var(--gold); border-bottom: 2px solid #222; }

        /* ROOT SELECTOR */
        .root-zone { height: 12dvh; padding: 5px; background: #050505; border-bottom: 1px solid #333; }
        .r-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px; height: 100%; }
        .r-btn { background: #151515; border: 1px solid #333; border-radius: 6px; color: #666; font-size: 12px; font-weight: 900; transition: 0.2s; }
        .r-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); border-color: #fff; }

        .main { flex: 1; display: grid; grid-template-columns: 1fr 280px; gap: 5px; padding: 5px; overflow: hidden; }

        /* SCROLLABLE MAQAM LIBRARY (50+) */
        .library { background: var(--panel); border: 1px solid #333; border-radius: 12px; overflow-y: scroll; padding: 5px; box-shadow: inset 0 0 20px #000; }
        .m-btn { width: 100%; background: #1a1a1a; border: none; color: #888; padding: 18px 12px; margin-bottom: 3px; text-align: left; border-radius: 6px; font-size: 12px; font-weight: bold; border-left: 5px solid transparent; }
        .m-btn.active { border-left-color: var(--flat); background: #252525; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* INFO PANEL */
        .info-panel { display: flex; flex-direction: column; gap: 10px; }
        .monitor-box { background: #000; border: 1px solid #333; border-radius: 10px; padding: 12px; flex: 1; }
        .active-title { color: var(--gold); font-size: 14px; font-weight: 900; text-align: center; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .comma-row { display: flex; justify-content: space-between; font-family: monospace; font-size: 11px; padding: 4px 0; border-bottom: 1px solid #111; }
        .val { color: var(--accent); }

        /* FOOTER */
        .footer { height: 12dvh; display: flex; gap: 8px; padding: 10px; background: #000; border-top: 1px solid #333; }
        .f-btn { flex: 1; border-radius: 10px; border: none; font-weight: 900; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <div>TITAN v73 • 52 MAQAM IMPERIAL SCALER</div>
    <div id="clock">00:00:00</div>
</div>

<div class="root-zone">
    <div class="r-grid" id="r-grid"></div>
</div>

<div class="main">
    <div class="library" id="m-list"></div>

    <div class="info-panel">
        <div class="monitor-box">
            <div class="active-title" id="m-title">SELECT MAQAM</div>
            <div id="m-details"></div>
        </div>
        
        <div style="background:#111; padding:10px; border-radius:10px; border:1px solid #222;">
            <div style="font-size:8px; color:#555; margin-bottom:5px;">FINE TUNE OFFSET (ALL COMMAS)</div>
            <input type="range" style="width:100%; height:30px; appearance:none; background:#333; border-radius:15px;" min="-15" max="15" value="0" oninput="updateFine(this.value)">
            <div id="offset-txt" style="text-align:center; font-size:10px; color:var(--accent); margin-top:5px;">0 cents</div>
        </div>
    </div>
</div>

<div class="footer">
    <button class="f-btn" style="background:var(--flat); color:#fff" onclick="allEqual()">NATURAL / EQUAL</button>
    <button class="f-btn" style="background:var(--accent); color:#000" onclick="mCC(80,15)">START</button>
    <button class="f-btn" style="background:var(--gold); color:#000" onclick="mCC(80,11)">BREAK</button>
</div>

<script>
let mO=null, cRoot=0, cMaqam=null, cOff=0;
const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

// Η ΒΙΒΛΙΟΘΗΚΗ ΤΩΝ 52 MAQAMS (ΜΕ ΑΚΡΙΒΕΙΑ COMMA)
const library = [
    {n:"Rast", d:[{s:4, c:-50}, {s:11, c:-50}]},
    {n:"Ussak", d:[{s:3, c:-35}]},
    {n:"Beyati", d:[{s:3, c:-40}]},
    {n:"Segah", d:[{s:0, c:-22}, {s:7, c:-22}]},
    {n:"Huzam", d:[{s:3, c:-35}, {s:8, c:-50}, {s:10, c:-50}]},
    {n:"Sabah", d:[{s:4, c:-50}, {s:11, c:-50}]},
    {n:"Saba", d:[{s:4, c:-44}, {s:8, c:-50}]},
    {n:"Hijaz", d:[]}, {n:"Nihavent", d:[]}, {n:"Kurd", d:[]},
    {n:"Karcigar", d:[{s:4, c:-50}, {s:10, c:-38}]},
    {n:"Suzinak", d:[{s:4, c:-50}, {s:11, c:-50}]},
    {n:"Hicazkar", d:[]}, {n:"Zirgule", d:[]},
    {n:"Bestenigar", d:[{s:4, c:-50}, {s:6, c:-35}, {s:11, c:-50}]},
    {n:"Ferahnak", d:[{s:4, c:-50}, {s:11, c:-50}]},
    {n:"Nikriz", d:[]}, {n:"Neveser", d:[{s:6, c:-50}]},
    {n:"Saba-Zemzeme", d:[{s:1, c:-45}, {s:4, c:-50}]},
    {n:"Zavil", d:[{s:6, c:-40}, {s:11, c:-50}]},
    {n:"Irak", d:[{s:4, c:-50}, {s:11, c:-50}]},
    {n:"Evic", d:[{s:4, c:-50}, {s:6, c:-35}, {s:11, c:-50}]},
    {n:"Mahur", d:[]}, {n:"Acem", d:[]}, {n:"Acem-Asiran", d:[]},
    {n:"Hüseyini", d:[{s:3, c:-35}]}, {n:"Muhayer", d:[{s:3, c:-35}]},
    {n:"Tahir", d:[{s:3, c:-35}]}, {n:"Neva", d:[{s:4, c:-50}]},
    {n:"Buselik", d:[]}, {n:"Hisar", d:[{s:4, c:-40}]},
    {n:"Hisar-Buselik", d:[]}, {n:"Sultani-Yegah", d:[]},
    {n:"Sedaraban", d:[]}, {n:"Suzidil", d:[]}, {n:"Evcara", d:[]},
    {n:"Ferahfeza", d:[]}, {n:"Dilkeside", d:[{s:3, c:-40}]},
    {n:"Ruhnevaz", d:[{s:4, c:-50}]}, {n:"Suz-i Dilara", d:[]},
    {n:"Saba-Buselik", d:[{s:4, c:-45}]}, {n:"Dügah", d:[{s:3, c:-35}]},
    {n:"Segah-Maye", d:[{s:0, c:-22}, {s:5, c:-50}]},
    {n:"Mustar", d:[{s:0, c:-22}, {s:2, c:-50}]},
    {n:"Huzzam-Cedid", d:[{s:3, c:-35}, {s:8, c:-50}]},
    {n:"Pesrev-Scale", d:[{s:4, c:-50}, {s:11, c:-50}]},
    {n:"Zemzeme", d:[]}, {n:"Gulizar", d:[{s:3, c:-40}]},
    {n:"Isfahan", d:[{s:3, c:-40}]}, {n:"Nisabur", d:[{s:4, c:-50}]},
    {n:"Rehavi", d:[{s:4, c:-50}, {s:11, c:-50}]},
    {n:"Arazbar", d:[{s:4, c:-50}]}
];

// INIT
navigator.requestMIDIAccess().then(a=>{mO=Array.from(a.outputs.values())[0];});

const rGrid = document.getElementById('r-grid');
notes.forEach((n,i)=>{
    let b=document.createElement('button'); b.className='r-btn'+(i===0?' active':'');
    b.innerText=n;
    b.onclick=()=>{ 
        document.querySelectorAll('.r-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); cRoot=i; engine(); 
    };
    rGrid.appendChild(b);
});

const mList = document.getElementById('m-list');
library.forEach((m, i)=>{
    let b=document.createElement('button'); b.className='m-btn';
    b.innerText = (i+1) + ". " + m.n;
    b.onclick=()=>{
        document.querySelectorAll('.m-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); cMaqam=m; engine();
    };
    mList.appendChild(b);
});

function updateFine(v) {
    cOff = parseInt(v);
    document.getElementById('offset-txt').innerText = (v>0?'+':'')+v+' cents';
    engine();
}

function engine() {
    if(!cMaqam) return;
    allEqual(false);
    document.getElementById('m-title').innerText = cMaqam.n;
    const det = document.getElementById('m-details');
    det.innerHTML = "";

    cMaqam.d.forEach(step => {
        let nIdx = (cRoot + step.s) % 12;
        let totalCents = step.c + cOff;
        sendFineTune(nIdx, totalCents);
        det.innerHTML += `<div class="comma-row"><span>${notes[nIdx]}</span><span class="val">${totalCents} cents</span></div>`;
    });
}

function sendFineTune(note, cents) {
    if(!mO) return;
    let val = 64 + Math.floor(cents * 0.64);
    mO.send([0xF0, 0x7F, 0x7F, 0x08, 0x02, 0x01, 0x01, note, note, val, 0x00, 0xF7]);
}

function allEqual(v=true) {
    if(v && navigator.vibrate) navigator.vibrate(25);
    document.getElementById('m-title').innerText = "NATURAL";
    document.getElementById('m-details').innerHTML = "";
    for(let i=0; i<12; i++) sendFineTune(i, 0);
}

function mCC(c,v){if(mO)mO.send([0xB0,c,v]);}
setInterval(()=>{document.getElementById('clock').innerText=new Date().toLocaleTimeString();},1000);
</script>
</body>
</html>

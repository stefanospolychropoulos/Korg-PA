<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TITAN Pa1000 UNIVERSAL</title>
    <style>
        :root { --bg: #000; --accent: #00f2ff; --red: #ff1744; --panel: #0d0d0d; --btn: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: #fff; margin: 0; 
            height: 100dvh; width: 100vw; overflow: hidden; 
            display: flex; flex-direction: column; 
        }

        /* Top Bar */
        .status-bar { height: 4dvh; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; font-size: 10px; color: #444; background: #000; }
        #midi-led { width: 8px; height: 8px; border-radius: 50%; background: #200; display: inline-block; margin-right: 5px; }

        /* Navigation */
        .nav { height: 8dvh; display: flex; background: #050505; border-bottom: 1px solid #222; }
        .tab { flex: 1; border: none; background: none; color: #555; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--accent); box-shadow: inset 0 -3px 0 var(--accent); }

        /* Main Content */
        .main { flex: 1; padding: 5px; display: flex; flex-direction: column; gap: 5px; overflow: hidden; }
        .view { display: none; height: 100%; flex-direction: column; gap: 5px; }
        .view.active { display: flex; }

        .card { background: var(--panel); border: 1px solid #1a1a1a; border-radius: 8px; padding: 6px; }
        .grid { display: grid; gap: 4px; }
        .g4 { grid-template-columns: repeat(4, 1fr); }
        .g3 { grid-template-columns: repeat(3, 1fr); }

        button { background: var(--btn); border: 1px solid #333; color: #fff; padding: 12px 2px; border-radius: 6px; font-weight: bold; font-size: 10px; }
        button:active { background: var(--accent) !important; color: #000 !important; }
        .b-red { border-color: var(--red); color: var(--red); }
        .n-act { background: var(--accent) !important; color: #000; box-shadow: 0 0 12px var(--accent); }

        /* Search */
        .search-wrap { position: relative; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 6px; color: var(--accent); font-weight: bold; font-size: 14px; }
        #res-box { position: absolute; width: 100%; max-height: 40dvh; background: rgba(0,0,0,0.95); border: 1px solid var(--accent); z-index: 999; overflow-y: auto; display: none; }
        .res-item { padding: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }

        /* FOOTER: ΕΔΩ ΕΙΝΑΙ Η ΑΛΛΑΓΗ ΓΙΑ ΤΟ ΚΙΝΗΤΟ */
        .footer { 
            height: 25dvh; 
            background: #000; 
            border-top: 1px solid #333; 
            padding: 8px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Default για Tablet */
            gap: 10px; 
        }

        /* Αν η οθόνη είναι στενή (Κινητό) */
        @media (max-width: 600px) {
            .footer {
                grid-template-columns: 1fr; /* Οι sliders μπαίνουν ο ένας κάτω από τον άλλο */
                height: 30dvh; /* Περισσότερος χώρος στο κινητό */
            }
            button { padding: 15px 2px; font-size: 11px; } /* Μεγαλύτερα κουμπιά στο κινητό */
        }

        .slider-group { position: relative; display: flex; align-items: center; background: #0a0a0a; border-radius: 10px; border: 1px solid #222; }
        
        input[type=range] { 
            width: 100%; height: 100%; appearance: none; background: transparent; margin: 0; padding: 0 10px;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 45px; height: 45px; background: var(--accent); border-radius: 8px; box-shadow: 0 0 15px var(--accent);
        }

        .slider-label { position: absolute; left: 15px; pointer-events: none; font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.2); text-transform: uppercase; }
    </style>
</head>
<body>

<div class="status-bar">
    <div><span id="midi-led"></span> <span id="clock">00:00</span></div>
    <div id="bat">BATT: --%</div>
</div>

<div class="nav">
    <button class="tab active" onclick="tab('live')">ENGINE</button>
    <button class="tab" onclick="tab('scale')">MAKAM</button>
    <button class="tab" onclick="tab('auto')">AUTO</button>
    <button class="tab b-red" onclick="panic()">PANIC</button>
</div>

<div class="main">
    <div id="live" class="view active">
        <div class="card g4 grid">
            <button onclick="document.getElementById('f').click()">FACT</button>
            <button onclick="document.getElementById('u').click()">USER</button>
            <button onclick="document.getElementById('d').click()">DIR</button>
            <button onclick="document.getElementById('s').click()">SBK</button>
        </div>
        <input type="file" id="f" hidden onchange="ld(this,'F')"><input type="file" id="u" hidden onchange="ld(this,'U')">
        <input type="file" id="d" hidden onchange="ld(this,'D')"><input type="file" id="s" hidden onchange="ld(this,'S')">

        <div class="search-wrap">
            <input type="text" id="sin" placeholder="SEARCH..." autocomplete="off">
            <div id="res-box"></div>
        </div>

        <div class="card grid g4">
            <button onclick="cc(80,0)">IN1</button><button onclick="cc(80,1)">IN2</button><button onclick="cc(80,2)">IN3</button><button onclick="cc(80,11)" class="b-red">BRK</button>
            <button onclick="cc(80,3)">V1</button><button onclick="cc(80,4)">V2</button><button onclick="cc(80,5)">V3</button><button onclick="cc(80,6)">V4</button>
            <button onclick="cc(80,7)" style="color:var(--accent)">F1</button><button onclick="cc(80,8)" style="color:var(--accent)">F2</button><button onclick="cc(80,9)" style="color:var(--accent)">F3</button><button onclick="cc(80,10)" style="color:var(--accent)">F4</button>
        </div>

        <div class="card grid g3" style="flex:1">
            <button ontouchstart="v(15);cc(80,127)" ontouchend="cc(80,0)">DNC 1</button>
            <button ontouchstart="v(15);cc(81,127)" ontouchend="cc(81,0)">DNC 2</button>
            <button ontouchstart="v(15);cc(82,127)" ontouchend="cc(82,0)">DNC 3</button>
        </div>
    </div>

    <div id="scale" class="view">
        <div class="card"><select id="mkm" onchange="applyM(this.value)" style="width:100%; background:#000; color:var(--accent); padding:10px; border:1px solid #333;"><option value="reset">NATURAL</option><option value="rast">RAST</option><option value="hitz">HITZAZ</option><option value="ous">USSAK</option><option value="sab">SABAH</option></select></div>
        <div id="sgrid" class="card grid g4" style="flex:1"></div>
        <button onclick="resS()" style="width:100%; height:50px;">RESET TUNING</button>
    </div>

    <div id="auto" class="view">
        <div class="card grid g2"><button id="rb" class="b-red" onclick="tRec()">REC</button><button onclick="play()">PLAY</button></div>
        <input type="text" id="sn" placeholder="Save name..." style="margin:5px 0;">
        <div class="card" id="alist" style="flex:1; overflow-y:auto;"></div>
        <button onclick="save()" style="width:100%; height:50px;">SAVE MACRO</button>
    </div>
</div>

<div class="footer">
    <div class="slider-group">
        <span class="slider-label">Pitch Bend</span>
        <input type="range" id="pb" min="0" max="16383" value="8192" oninput="bend(this.value)" ontouchend="rPB()">
    </div>
    <div class="slider-group">
        <span class="slider-label">Expression</span>
        <input type="range" min="0" max="127" value="127" oninput="cc(11,this.value)">
    </div>
</div>

<script>
let out = null, dtn = new Array(12).fill(false), db = [], rec = false, seq = [], st = 0;

navigator.requestMIDIAccess({sysex:true}).then(m => {
    out = Array.from(m.outputs.values())[0];
    if(out) document.getElementById('midi-led').style.background = '#00f2ff';
});

function cc(c,v) { 
    if(out) out.send([0xB0, c, v]); 
    if(rec) seq.push({t: Date.now()-st, d: [0xB0, c, v]});
}
function v(ms) { if(navigator.vibrate) navigator.vibrate(ms); }
function bend(v) { if(out) out.send([0xE0, v & 0x7F, (v >> 7) & 0x7F]); }
function rPB() { document.getElementById('pb').value=8192; bend(8192); }

function panic() {
    if(!out) return;
    for(let i=0; i<16; i++) { out.send([0xB0+i, 123, 0]); out.send([0xB0+i, 121, 0]); }
    cc(80,10); v(50);
}

setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
navigator.getBattery().then(b => {
    const u = () => document.getElementById('bat').innerText = "BAT: " + Math.round(b.level * 100) + "%";
    u(); b.onlevelchange = u;
});

function setN(i, s) {
    dtn[i] = s;
    document.getElementById('n'+i).classList.toggle('n-act', s);
    if(out) out.send([0xF0, 0x42, 0x40, 0x00, 0x01, 0x05, 0x08, i, s ? 0x0E : 0x40, 0xF7]);
}
function resS() { for(let i=0; i<12; i++) setN(i, false); }
const mkms = {"rast":[4,11],"hitz":[1,6],"ous":[4],"sab":[4,6,11]};
function applyM(m) { resS(); if(mkms[m]) mkms[m].forEach(n => setN(n,true)); }

function ld(f, c) {
    const r = new FileReader();
    r.onload = (e) => {
        e.target.result.split('\n').forEach(l => {
            const p = l.split(',');
            if(p.length >= 4) db.push({n:p[0].trim(), m:p[1].trim(), l:p[2].trim(), pc:p[3].trim(), cat:c});
        });
        alert(c + " LOADED");
    };
    r.readAsText(f.files[0]);
}

const sin = document.getElementById('sin'), res = document.getElementById('res-box');
sin.oninput = function() {
    const val = this.value.toLowerCase();
    if(val.length < 2) { res.style.display='none'; return; }
    res.innerHTML = '';
    const filtered = db.filter(x => x.n.toLowerCase().includes(val)).slice(0,30);
    if(filtered.length > 0) {
        res.style.display = 'block';
        filtered.forEach(i => {
            const d = document.createElement('div'); d.className='res-item';
            d.innerHTML = `<span>${i.n}</span><small style="color:var(--accent)">${i.cat}</small>`;
            d.onclick = () => {
                cc(0,i.m); cc(32,i.l); if(out) out.send([0xC0, i.pc]);
                res.style.display='none'; sin.value=i.n;
            };
            res.appendChild(d);
        });
    }
};

function tRec() { rec = !rec; document.getElementById('rb').innerText = rec ? "ON" : "REC"; if(rec) { seq=[]; st=Date.now(); } }
function play() { seq.forEach(e => setTimeout(() => { if(out) out.send(e.d); }, e.t)); }
function save() { localStorage.setItem('t_'+(document.getElementById('sn').value||Date.now()), JSON.stringify(seq)); upL(); }
function upL() {
    const l = document.getElementById('alist'); l.innerHTML = '';
    for(let i=0; i<localStorage.length; i++) {
        let k = localStorage.key(i); 
        if(k.startsWith('t_')) {
            let d = document.createElement('div'); d.className='res-item'; d.innerText=k.substring(2);
            d.onclick = () => seq = JSON.parse(localStorage.getItem(k));
            l.appendChild(d);
        }
    }
}

function tab(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

const g = document.getElementById('sgrid');
['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'].forEach((n,i) => {
    g.innerHTML += `<button id="n${i}" onclick="setN(${i},!dtn[${i}])">${n}</button>`;
});
upL();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Korg Pa1000 Ultimate Mirror</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #ff9800; --panel: #1a1a1a; --btn: #333; --blue: #1565c0; --green: #2e7d32; --purple: #6a1b9a; --red: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Tabs */
        .tab-bar { display: flex; background: #222; border-bottom: 2px solid var(--accent); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #777; cursor: pointer; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent); background: #2a2a2a; border-bottom: 3px solid var(--accent); }

        .content { flex: 1; overflow-y: auto; padding: 10px; display: none; }
        .content.active { display: block; }

        /* Banks Matrix Setup */
        .section-label { font-size: 9px; color: var(--accent); font-weight: bold; margin: 8px 0 3px 0; text-transform: uppercase; }
        .banks-matrix { display: grid; grid-template-columns: repeat(9, 1fr); gap: 3px; background: #111; padding: 5px; border-radius: 5px; border: 1px solid #333; }
        
        .bank-btn { padding: 8px 0; font-size: 9px; border: 1px solid #444; border-radius: 3px; cursor: pointer; color: white; font-weight: bold; }
        .b-factory { background: #222; }
        .b-user { background: var(--green); }
        .b-fav { background: var(--blue); }
        .b-direct { background: var(--purple); }
        .bank-btn.active { background: var(--accent) !important; color: black; border-color: white; }

        /* Style Mirror Grid (8 Slots) */
        .mirror-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; height: 240px; }
        .slot { background: linear-gradient(180deg, #333, #111); border: 1px solid #555; border-radius: 6px; display: flex; align-items: center; padding-left: 12px; font-size: 13px; font-weight: 500; cursor: pointer; height: 50px; }
        .slot:active { background: var(--accent); color: black; }

        .page-ctrl { display: flex; justify-content: center; gap: 3px; margin-top: 10px; flex-wrap: wrap; }
        .p-btn { min-width: 30px; height: 30px; background: #222; border: 1px solid #444; color: white; font-size: 9px; border-radius: 3px; }
        .p-btn.active { background: var(--accent); color: black; }

        .search-box { width: 100%; padding: 12px; background: #000; border: 1px solid var(--accent); color: white; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Mixer & Scale */
        .panel { background: var(--panel); border-radius: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .chan-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
        .v-slider { appearance: slider-vertical; width: 25px; height: 80px; accent-color: var(--accent); }
    </style>
</head>
<body>

<div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('live')">LIVE</button>
    <button class="tab-btn" onclick="showTab('mirror')">STYLES (MIRROR)</button>
    <button class="tab-btn" onclick="showTab('songbook')">SONGBOOK</button>
    <button class="tab-btn" onclick="showTab('mixer')">MIXER / SCALES</button>
</div>

<div id="live" class="content active">
    <div class="panel" style="display:grid; grid-template-columns: repeat(4,1fr); gap:5px;">
        <button onclick="sendCC(80,0)">Intro 1</button><button onclick="sendCC(80,1)">Intro 2</button><button onclick="sendCC(80,2)">Intro 3</button><button onclick="sendCC(80,11)" style="background:var(--red)">BREAK</button>
        <button onclick="sendCC(80,3)">Var 1</button><button onclick="sendCC(80,4)">Var 2</button><button onclick="sendCC(80,5)">Var 3</button><button onclick="sendCC(80,6)">Var 4</button>
        <button onclick="sendDirect(0xFC)" style="grid-column: span 2; height:60px; background:var(--red)">STOP</button>
        <button onclick="sendDirect(0xFA)" style="grid-column: span 2; height:60px; background:var(--green)">START</button>
    </div>
</div>

<div id="mirror" class="content">
    <div class="panel">
        <input type="file" id="styleFile" style="display:none" onchange="loadSet(this)">
        <button onclick="document.getElementById('styleFile').click()" style="width:100%; background:var(--blue); padding:10px; margin-bottom:8px;">LOAD FULL SET (.TXT)</button>
        <input type="text" class="search-box" id="styleSearch" placeholder="🔍 Αναζήτηση σε Factory, User, Direct..." oninput="searchStyles(this.value)">
    </div>

    <div id="mirrorContainer">
        <div class="section-label">Factory Banks</div>
        <div class="banks-matrix" id="factoryBanks"></div>

        <div class="section-label">User & Favorite Banks</div>
        <div class="banks-matrix" id="userBanks"></div>

        <div class="section-label">Direct Banks (USB)</div>
        <div class="banks-matrix" id="directBanks"></div>

        <div class="mirror-grid" id="styleGrid"></div>
        <div class="page-ctrl" id="stylePages"></div>
    </div>
    <div id="styleSearchResults" style="display:none;" class="panel"></div>
</div>

<div id="songbook" class="content">
    <input type="file" id="songFile" style="display:none" onchange="loadSongs(this)">
    <button onclick="document.getElementById('songFile').click()" style="width:100%; background:var(--green); padding:10px; margin-bottom:10px;">LOAD SONGBOOK (.TXT)</button>
    <input type="text" class="search-box" placeholder="Αναζήτηση τραγουδιού..." oninput="searchSongs(this.value)">
    <div id="songList" style="display:grid; gap:5px;"></div>
</div>

<div id="mixer" class="content">
    <div class="panel chan-grid">
        <div class="chan"><span>UP1</span><br><input type="range" class="v-slider" oninput="setVol(0,this.value)"></div>
        <div class="chan"><span>UP2</span><br><input type="range" class="v-slider" oninput="setVol(1,this.value)"></div>
        <div class="chan"><span>UP3</span><br><input type="range" class="v-slider" oninput="setVol(2,this.value)"></div>
        <div class="chan"><span>STY</span><br><input type="range" class="v-slider" oninput="sendCC(39,this.value)"></div>
    </div>
    <div class="panel">
        <div id="scaleGrid" style="display:grid; grid-template-columns: repeat(6,1fr); gap:5px;"></div>
        <button onclick="resetScale()" style="width:100%; margin-top:10px; background:#444; padding:10px;">RESET SCALE</button>
    </div>
</div>

<script>
let midiOut = null;
let currentBank = 10, currentBankCC32 = 0, currentPage = 1;
let styleMirror = {}, songMirror = [], detunedNotes = new Array(12).fill(false);

const factoryNames = ["P1","P2","P3","P4","P5","P6","P7","P8","P9"];
const userNames = ["U1","U2","U3","U4","U5","U6","FV1","FV2","FV3","FV4","FV5","FV6","FV7","FV8","FV9","FV10"];
const directNames = ["DU1","DU2","DU3","DU4","DU5","DU6","DF1","DF2","DF3","DF4","DF5","DF6","DF7","DF8","DF9","DF10"];

// MIDI Init
navigator.requestMIDIAccess({sysex:true}).then(access => midiOut = Array.from(access.outputs.values())[0]);

function sendCC(cc, val) { if(midiOut) midiOut.send([0xB0, cc, val]); }
function sendDirect(b) { if(midiOut) midiOut.send([b]); }
function setVol(c, v) { if(midiOut) midiOut.send([0xB0 + c, 7, v]); }

function initBanks() {
    const fDiv = document.getElementById('factoryBanks');
    const uDiv = document.getElementById('userBanks');
    const dDiv = document.getElementById('directBanks');

    factoryNames.forEach((n, i) => createBankBtn(n, i + 1, i, fDiv, 'b-factory'));
    userNames.forEach((n, i) => createBankBtn(n, i + 10, i + 9, uDiv, n.startsWith('U') ? 'b-user' : 'b-fav'));
    directNames.forEach((n, i) => createBankBtn(n, i + 26, i + 25, dDiv, 'b-direct'));
}

function createBankBtn(name, id, cc32, container, cls) {
    const b = document.createElement('button');
    b.className = `bank-btn ${cls} bank-id-${id}`;
    b.innerText = name;
    if(id === 10) b.classList.add('active'); // Start at User 1
    b.onclick = () => {
        currentBank = id; currentBankCC32 = cc32; currentPage = 1;
        document.querySelectorAll('.bank-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        renderStyleGrid();
    };
    container.appendChild(b);
}

function loadSet(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const lines = e.target.result.split('\n').map(l => l.trim()).filter(l => l !== "");
        for(let i = 1; i <= 50; i++) styleMirror[i] = lines.slice((i-1)*128, i*128);
        renderStyleGrid();
    };
    reader.readAsText(input.files[0]);
}

function renderStyleGrid() {
    document.getElementById('mirrorContainer').style.display = 'block';
    document.getElementById('styleSearchResults').style.display = 'none';
    const grid = document.getElementById('styleGrid'); grid.innerHTML = '';
    const start = (currentPage-1)*8; const names = styleMirror[currentBank] || [];
    for(let i=0; i<8; i++) {
        const idx = start + i;
        const div = document.createElement('div'); div.className = 'slot';
        div.innerText = names[idx] || (idx+1)+". ---";
        div.onclick = () => { sendCC(0,0); sendCC(32, currentBankCC32); midiOut.send([0xC0, idx]); };
        grid.appendChild(div);
    }
    const pg = document.getElementById('stylePages'); pg.innerHTML = '';
    for(let i=1; i<=16; i++) {
        const b = document.createElement('button'); b.className = `p-btn ${i===currentPage?'active':''}`;
        b.innerText = 'P'+i; b.onclick = () => { currentPage = i; renderStyleGrid(); };
        pg.appendChild(b);
    }
}

function searchStyles(q) {
    if(!q) { renderStyleGrid(); return; }
    document.getElementById('mirrorContainer').style.display = 'none';
    const res = document.getElementById('styleSearchResults');
    res.style.display = 'block'; res.innerHTML = '';
    for(let b in styleMirror) {
        styleMirror[b].forEach((name, idx) => {
            if(name.toLowerCase().includes(q.toLowerCase())) {
                const btn = document.createElement('button');
                btn.style = "width:100%; text-align:left; padding:12px; margin-bottom:5px; background:#222; color:white; border:none; border-left:4px solid var(--accent);";
                btn.innerText = `[Bank ${b}] ${name}`;
                btn.onclick = () => { sendCC(0,0); sendCC(32, b-1); midiOut.send([0xC0, idx]); };
                res.appendChild(btn);
            }
        });
    }
}

// SONG LOGIC
function loadSongs(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        songMirror = e.target.result.split('\n').map(l => l.trim()).filter(l => l !== "");
        renderSongs(songMirror);
    };
    reader.readAsText(input.files[0]);
}
function renderSongs(list) {
    document.getElementById('songList').innerHTML = list.map((s, i) => `<button onclick="selectSong(${i})" style="text-align:left; padding:15px; background:#222; border:none; color:white;">${s}</button>`).join('');
}
function searchSongs(q) { renderSongs(songMirror.filter(s => s.toLowerCase().includes(q.toLowerCase()))); }
function selectSong(i) { sendCC(0,0); midiOut.send([0xC0, i % 128]); }

// SCALE
const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const sGrid = document.getElementById('scaleGrid');
notes.forEach((n,i) => { sGrid.innerHTML += `<button id="n${i}" onclick="tScale(${i})" style="padding:15px 0; background:#333; color:white; border:none;">${n}</button>`; });

function tScale(i) {
    detunedNotes[i] = !detunedNotes[i];
    document.getElementById('n'+i).style.background = detunedNotes[i] ? 'var(--blue)' : '#333';
    midiOut.send([0xF0, 0x42, 0x40, 0x00, 0x01, 0x05, 0x08, i, detunedNotes[i]?14:64, 0xF7]);
}
function resetScale() {
    detunedNotes.fill(false);
    notes.forEach((n,i) => { document.getElementById('n'+i).style.background = '#333'; midiOut.send([0xF0, 0x42, 0x40, 0x00, 0x01, 0x05, 0x08, i, 64, 0xF7]); });
}

function showTab(id) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active'); event.currentTarget.classList.add('active');
}

initBanks();
renderStyleGrid();
</script>
</body>
</html>

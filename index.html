<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN Pa1000 v41 - FULL MASTER</title>
    <style>
        :root { --bg: #000; --accent: #00f2ff; --red: #ff1744; --orange: #ffab40; --panel: #0d0d0d; --btn: #1a1a1a; --text: #eee; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; outline: none; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        .status-bar { height: 4dvh; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; font-size: 10px; color: #555; background: #050505; border-bottom: 1px solid #111; }
        #midi-led { width: 10px; height: 10px; border-radius: 50%; background: #200; box-shadow: 0 0 5px #000; transition: 0.3s; }
        
        /* NAVIGATION */
        .nav { height: 8dvh; display: flex; background: #050505; border-bottom: 1px solid #222; }
        .tab { flex: 1; border: none; background: none; color: #444; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .tab.active { color: var(--accent); box-shadow: inset 0 -3px 0 var(--accent); background: #0a0a0a; }

        /* MAIN CONTENT */
        .main { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
        .view { display: none; height: 100%; flex-direction: column; gap: 10px; }
        .view.active { display: flex; }
        
        .card { background: var(--panel); border: 1px solid #1a1a1a; border-radius: 12px; padding: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.6); }
        .label { font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: 900; letter-spacing: 0.5px; }
        
        .grid { display: grid; gap: 8px; }
        .g4 { grid-template-columns: repeat(4, 1fr); }
        .g3 { grid-template-columns: repeat(3, 1fr); }
        
        /* BUTTONS */
        button { background: var(--btn); border: 1px solid #333; color: #fff; padding: 16px 2px; border-radius: 8px; font-weight: bold; font-size: 11px; transition: 0.1s; }
        button:active { background: var(--accent) !important; color: #000 !important; transform: scale(0.96); }
        
        .btn-pad { background: #0a0a0a; border: 1px solid var(--orange); color: var(--orange); height: 65px; font-size: 13px; }
        .btn-pad:active { background: var(--orange) !important; color: #000 !important; box-shadow: 0 0 25px var(--orange); }
        
        .b-red { border-color: var(--red); color: var(--red); }
        .n-act { background: var(--accent) !important; color: #000; box-shadow: 0 0 20px var(--accent); border:none; }
        
        /* SELECT BOX */
        select { background: #111; color: var(--accent); border: 1px solid #333; padding: 16px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; appearance: none; text-align: center; cursor: pointer; }
        
        /* FOOTER SLIDER */
        .footer { height: 20dvh; background: #000; border-top: 1px solid #333; padding: 15px; display: flex; flex-direction: column; justify-content: center; }
        .slider-group { position: relative; height: 80px; background: #050505; border-radius: 20px; border: 1px solid #222; overflow: hidden; }
        input[type=range] { width: 100%; height: 100%; appearance: none; background: transparent; cursor: pointer; z-index: 5; position: relative; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 100px; height: 80px; background: var(--accent); border-radius: 15px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
        .slider-bg-text { position: absolute; width: 100%; text-align: center; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 900; color: #222; z-index: 1; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="status-bar">
    <div><span id="midi-led"></span> MIDI SYSTEM ACTIVE</div>
    <div id="clock">00:00:00</div>
    <div id="bat">BATT: --%</div>
</div>

<div class="nav">
    <button class="tab active" onclick="tab('live', this)">ENGINE</button>
    <button class="tab" onclick="tab('scale', this)">MAKAM</button>
    <button class="tab" onclick="tab('auto', this)">MACROS</button>
</div>

<div class="main">
    <div id="live" class="view active">
        <div class="card">
            <span class="label">Performance Pads (Touch On/Off)</span>
            <div class="grid g4">
                <button class="btn-pad" ontouchstart="cc(102,127)" ontouchend="cc(102,0)">PAD 1</button>
                <button class="btn-pad" ontouchstart="cc(103,127)" ontouchend="cc(103,0)">PAD 2</button>
                <button class="btn-pad" ontouchstart="cc(104,127)" ontouchend="cc(104,0)">PAD 3</button>
                <button class="btn-pad" ontouchstart="cc(105,127)" ontouchend="cc(105,0)">PAD 4</button>
            </div>
            <button onclick="cc(106,127)" style="width:100%; margin-top:8px; height:35px; color:var(--red); border-color:var(--red); font-size:10px;">STOP ALL PADS</button>
        </div>

        <div class="card">
            <span class="label">Style Elements & Variations</span>
            <div class="grid g4">
                <button onclick="cc(80,0)">IN 1</button><button onclick="cc(80,1)">IN 2</button><button onclick="cc(80,2)">IN 3</button><button onclick="cc(80,11)" class="b-red">BREAK</button>
                <button onclick="cc(80,3)">VAR 1</button><button onclick="cc(80,4)">VAR 2</button><button onclick="cc(80,5)">VAR 3</button><button onclick="cc(80,6)">VAR 4</button>
                <button onclick="cc(80,7)" style="color:var(--accent)">FILL 1</button><button onclick="cc(80,8)" style="color:var(--accent)">FILL 2</button><button onclick="cc(80,9)" style="color:var(--accent)">FILL 3</button><button onclick="cc(80,10)" style="color:var(--accent)">FILL 4</button>
                <button onclick="cc(80,12)">END 1</button><button onclick="cc(80,13)">END 2</button><button onclick="cc(80,14)">END 3</button><button onclick="panic()" class="b-red">PANIC</button>
            </div>
        </div>

        <div class="card grid g3" style="flex:1">
            <button ontouchstart="cc(80,127)" ontouchend="cc(80,0)">DNC 1</button>
            <button ontouchstart="cc(81,127)" ontouchend="cc(81,0)">DNC 2</button>
            <button ontouchstart="cc(82,127)" ontouchend="cc(82,0)">DNC 3</button>
        </div>
    </div>

    <div id="scale" class="view">
        <div class="card">
            <span class="label">Professional Makam Selector</span>
            <select id="mkm_select">
                <option value="none">-- NATURAL (OFF) --</option>
                <optgroup label="ΚΥΡΙΑ ΛΑΪΚΑ">
                    <option value="rast">RAST (Ραστ -31c)</option>
                    <option value="ussak">USSAK (Ουσάκ -58c)</option>
                    <option value="hicaz">HICAZ (Χιτζάζ -45c)</option>
                    <option value="huzam">HUZAM (Χουζάμ)</option>
                    <option value="sabah">SABAH (Σαμπάχ)</option>
                </optgroup>
                <optgroup label="ΑΝΑΤΟΛΙΚΑ / ΣΥΝΘΕΤΑ">
                    <option value="karj">KARJIGAR (Καρτζιγιάρ)</option>
                    <option value="neva">NEVA (Νεβά)</option>
                    <option value="beyat">BEYATI (Μπεϊγιατί)</option>
                    <option value="ispah">ISPAHAN (Ισπαχάν)</option>
                    <option value="u-ced">UZZAL CEDID</option>
                    <option value="hisar">HISAR (Χισάρ)</option>
                </optgroup>
                <optgroup label="ΣΕΓΚΙΑΧ & ΠΑΡΑΛΛΑΓΕΣ">
                    <option value="sega">SEGAH (Σεγκιάχ)</option>
                    <option value="must">MUSTAAR (Μουσταάρ)</option>
                    <option value="best">BESTENIGAR</option>
                    <option value="evic">EVIC (Εβίτς)</option>
                    <option value="iraq">IRAQ (Ιράκ)</option>
                    <option value="ferah">FERAHNAK</option>
                </optgroup>
                <optgroup label="ΕΙΔΙΚΑ ΚΟΥΡΔΙΣΜΑΤΑ">
                    <option value="z-hic">ZIRGULE HICAZ</option>
                    <option value="suzin">SUZINAK</option>
                    <option value="nakis">NAKIS</option>
                    <option value="rehav">REHAVI</option>
                    <option value="penj">PENJIGAH</option>
                    <option value="acem">ACEM (Ατζέμ)</option>
                    <option value="mahur">MAHUR (Μαχούρ)</option>
                    <option value="kurdi">KURDI (Κιουρδί)</option>
                    <option value="nihav">NIHAVENT (Νιαβέντ)</option>
                </optgroup>
            </select>
        </div>
        <div class="card" style="flex:1;">
            <span class="label">Select Tonic (Base Note)</span>
            <div id="sgrid" class="grid g4"></div>
        </div>
        <button onclick="resS()" style="width:100%; height:45px; color: var(--red); border-color: var(--red); font-weight:900;">RESET ALL SCALES</button>
    </div>

    <div id="auto" class="view">
        <div class="card" style="flex:1; display:flex; align-items:center; justify-content:center;">
            <p style="color:#333; font-weight:bold; font-size:12px; text-align:center;">MACRO RECORDING ENGINE<br>COMING SOON IN V42</p>
        </div>
    </div>
</div>

<div class="footer">
    <div class="slider-group">
        <div class="slider-bg-text">PITCH BEND CONTROL</div>
        <input type="range" id="pb" min="0" max="16383" value="8192" oninput="bend(this.value)" ontouchend="rPB()">
    </div>
</div>

<script>
let out = null, dtn = new Array(12).fill(false);

// MIDI CONNECTION
navigator.requestMIDIAccess({sysex:true}).then(m => {
    out = Array.from(m.outputs.values())[0];
    if(out) {
        document.getElementById('midi-led').style.background = '#00f2ff';
        document.getElementById('midi-led').style.boxShadow = '0 0 15px #00f2ff';
    }
});

function cc(c,v) { if(out) out.send([0xB0, c, v]); if(navigator.vibrate) navigator.vibrate(25); }
function bend(v) { if(out) out.send([0xE0, v & 0x7F, (v >> 7) & 0x7F]); }
function rPB() { document.getElementById('pb').value=8192; bend(8192); }
function panic() { for(let i=0; i<16; i++) if(out) out.send([0xB0+i, 123, 0]); if(navigator.vibrate) navigator.vibrate(100); }

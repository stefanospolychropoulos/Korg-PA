<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TITAN Pa1000 v46 - SONGBOOK</title>
    <style>
        :root { --bg: #000; --accent: #00f2ff; --red: #ff1744; --orange: #ffab40; --panel: #0d0d0d; --btn: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .status-bar { height: 4dvh; display: flex; justify-content: space-between; align-items: center; padding: 0 12px; font-size: 10px; color: #555; background: #050505; border-bottom: 1px solid #222; }
        #midi-led { width: 10px; height: 10px; border-radius: 50%; background: #200; box-shadow: 0 0 5px #000; }
        
        .nav { height: 8dvh; display: flex; background: #050505; border-bottom: 1px solid #222; }
        .tab { flex: 1; border: none; background: none; color: #444; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--accent); box-shadow: inset 0 -3px 0 var(--accent); background: #0a0a0a; }

        .main { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .view { display: none; flex-direction: column; gap: 8px; }
        .view.active { display: flex; }
        
        .card { background: var(--panel); border: 1px solid #1a1a1a; border-radius: 12px; padding: 12px; }
        .label { font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: 900; }
        
        .grid { display: grid; gap: 8px; }
        .g4 { grid-template-columns: repeat(4, 1fr); }
        .g2 { grid-template-columns: repeat(2, 1fr); }
        
        button { background: var(--btn); border: 1px solid #333; color: #fff; padding: 18px 2px; border-radius: 8px; font-weight: bold; font-size: 11px; }
        button:active { background: var(--accent) !important; color: #000 !important; }
        
        /* SongBook Style */
        .btn-song { background: #0d1a1a; border-color: #004d4d; color: var(--accent); text-align: left; padding: 15px; font-size: 14px; position: relative; }
        .btn-song span { font-size: 9px; color: #444; display: block; }

        .btn-pad { background: #0a0a0a; border: 1px solid var(--orange); color: var(--orange); height: 60px; }
        .n-act { background: var(--accent) !important; color: #000; border:none; }
        
        select { background: #111; color: var(--accent); border: 1px solid #333; padding: 16px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; appearance: none; text-align: center; }
        
        .footer { height: 22dvh; background: #000; border-top: 1px solid #333; padding: 15px; display: flex; flex-direction: column; justify-content: center; }
        .pb-container { position: relative; height: 85px; background: #0a0a0a; border-radius: 15px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; }
        #pb-slider { width: 100%; height: 100%; appearance: none; background: transparent; z-index: 10; }
        #pb-slider::-webkit-slider-thumb { appearance: none; width: 110px; height: 85px; background: var(--accent); border-radius: 12px; }
        .pb-text { position: absolute; font-size: 11px; font-weight: 900; color: #222; pointer-events: none; }
    </style>
</head>
<body>

<div class="status-bar">
    <div><span id="midi-led"></span> Pa1000 CONNECTED</div>
    <div id="clock">00:00:00</div>
    <div id="bat">BATT: --%</div>
</div>

<div class="nav">
    <button class="tab active" onclick="tab('live', this)">ENGINE</button>
    <button class="tab" onclick="tab('scale', this)">MAKAM</button>
    <button class="tab" onclick="tab('auto', this)">SONGBOOK</button>
</div>

<div class="main">
    <div id="live" class="view active">
        <div class="card">
            <span class="label">Pads (Touch On/Off)</span>
            <div class="grid g4">
                <button class="btn-pad" ontouchstart="sCC(102,127)" ontouchend="sCC(102,0)">PAD 1</button>
                <button class="btn-pad" ontouchstart="sCC(103,127)" ontouchend="sCC(103,0)">PAD 2</button>
                <button class="btn-pad" ontouchstart="sCC(104,127)" ontouchend="sCC(104,0)">PAD 3</button>
                <button class="btn-pad" ontouchstart="sCC(105,127)" ontouchend="sCC(105,0)">PAD 4</button>
            </div>
        </div>

        <div class="card">
            <span class="label">Style Controls</span>
            <div class="grid g4">
                <button onclick="sCC(80,0)">IN 1</button><button onclick="sCC(80,1)">IN 2</button><button onclick="sCC(80,3)">V1</button><button onclick="sCC(80,4)">V2</button>
                <button onclick="sCC(80,5)">V3</button><button onclick="sCC(80,6)">V4</button><button onclick="sCC(80,7)">F1</button><button onclick="sCC(80,8)">F2</button>
                <button onclick="sCC(80,11)" style="color:var(--red)">BREAK</button>
                <button onclick="sCC(80,12)">END 1</button><button onclick="sCC(80,13)">END 2</button><button onclick="panic()" style="color:var(--red)">PANIC</button>
            </div>
        </div>
    </div>

    <div id="scale" class="view">
        <div class="card">
            <select id="mkm_select">
                <option value="none">-- NATURAL --</option>
                <option value="rast">RAST (-31)</option>
                <option value="ussak">USSAK (-58)</option>
                <option value="hicaz">HICAZ (-45)</option>
                <option value="huzam">HUZAM</option>
                <option value="sabah">SABAH</option>
            </select>
        </div>
        <div class="card"><div id="sgrid" class="grid g4"></div></div>
        <button onclick="resS()" style="width:100%; border-color:var(--red); color:var(--red);">RESET ALL</button>
    </div>

    <div id="auto" class="view">
        <div class="card">
            <span class="label">Quick Song Selection</span>
            <div class="grid g2">
                <button class="btn-song" onclick="loadSong(0, 'rast', 0)">
                    <span>001 - ΖΕΪΜΠΕΚΙΚΟ</span>ΕΥΔΟΚΙΑ
                </button>
                <button class="btn-song" onclick="loadSong(1, 'hicaz', 2)">
                    <span>002 - ΤΣΙΦΤΕΤΕΛΙ</span>ΜΙΣΙΡΛΟΥ
                </button>
                <button class="btn-song" onclick="loadSong(2, 'ussak', 9)">
                    <span>003 - ΧΑΣΑΠΙΚΟ</span>ΦΡΑΓΚΟΣΥΡΙΑΝΗ
                </button>
                <button class="btn-song" onclick="loadSong(3, 'huzam', 4)">
                    <span>004 - ΚΑΡΣΙΛΑΜΑΣ</span>ΠΕΡΙΠΛΑΝΩΜΕΝΟΣ
                </button>
            </div>
        </div>
        <div class="card">
            <p style="font-size:10px; color:#444; text-align:center;">Σημείωση: Τα νούμερα αντιστοιχούν στη σειρά του SongBook στο Pa1000.</p>
        </div>
    </div>
</div>

<div class="footer">
    <div class="pb-container">
        <div class="pb-text">PITCH BEND</div>
        <input type="range" id="pb-slider" min="0" max="16383" value="8192" oninput="sPB(this.value)" ontouchend="resPB()">
    </div>
</div>

<script>
let mO = null;
const nts = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

navigator.requestMIDIAccess({sysex:true}).then(a => {
    mO = Array.from(a.outputs.values())[0];
    if(mO) document.getElementById('midi-led').style.background = '#00f2ff';
});

function sCC(c, v) { if(mO) mO.send([0xB0, c, v]); }
function sPB(v) { if(mO) mO.send([0xE0, v & 0x7F, (v >> 7) & 0x7F]); }
function resPB() { document.getElementById('pb-slider').value=8192; sPB(8192); }
function panic() { for(let i=0; i<16; i++) if(mO) mO.send([0xB0+i, 123, 0]); }

// SongBook Loader
function loadSong(id, makam, tonic) {
    // 1. Στέλνει Program Change στο Control Channel (συνήθως 16) για να αλλάξει SongBook Entry
    if(mO) mO.send([0xC0, id]); 
    // 2. Αυτόματη εφαρμογή Μακάμ για το συγκεκριμένο τραγούδι
    document.getElementById('mkm_select').value = makam;
    applyMakam(tonic);
    if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
}

const mD = {
    "rast": [{idx:4, val:0x21}, {idx:11, val:0x21}],
    "ussak": [{idx:2, val:0x05}],
    "hicaz": [{idx:1, val:0x12}],
    "huzam": [{idx:1, val:0x15}, {idx:4, val:0x21}, {idx:11, val:0x21}],
    "sabah": [{idx:2, val:0x05}, {idx:6, val:0x0E}]
};

function applyMakam(bIdx) {
    const t = document.getElementById('mkm_select').value;
    resS();
    if(t !== "none") mD[t].forEach(n => setT((bIdx + n.idx) % 12, true, n.val));
}

function setT(n, s, v) {
    const b = document.getElementById('n'+n);
    if(b) b.classList.toggle('n-act', s);
    if(mO) mO.send([0xF0, 0x42, 0x40, 0x00, 0x01, 0x05, 0x08, n, s ? v : 0x40, 0xF7]);
}

function resS() { for(let i=0; i<12; i++) setT(i, false); }

const sg = document.getElementById('sgrid');
nts.forEach((n, i) => {
    const b = document.createElement('button');
    b.id = 'n'+i; b.innerText = n;
    b.onclick = () => applyMakam(i);
    sg.appendChild(b);
});

function tab(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
